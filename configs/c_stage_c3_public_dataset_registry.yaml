    split_policy: test_run_split_required
    leakage_risks: "Bearing run, time-adjacent windows, and fault progression metadata must not leak across splits."
    allowed_metrics: [forecasting_mae, forecasting_rmse, linear_probe_macro_f1]
    go_no_go_prerequisites:
